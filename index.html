<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Rede Neural de Xadrez</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .board-container {
            display: inline-block;
            margin: 20px 0;
        }

        .chessboard {
            display: inline-grid;
            grid-template-columns: repeat(8, 60px);
            gap: 0;
            border: 3px solid #333;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            background: #333;
        }

        .square {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .square:hover {
            opacity: 0.8;
            transform: scale(0.95);
        }

        .light {
            background-color: #f0d9b5;
            color: #333;
        }

        .dark {
            background-color: #b58863;
            color: #333;
        }

        .stats {
            color: white;
            margin-top: 30px;
            font-size: 1.1em;
        }

        .stat-row {
            margin: 10px 0;
        }

        .stat-label {
            font-weight: bold;
            display: inline-block;
            width: 150px;
            text-align: right;
            margin-right: 10px;
        }

        .stat-value {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 5px;
            display: inline-block;
            min-width: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 Rede Neural de Xadrez</h1>
        
        <div class="board-container">
            <div class="chessboard" id="chessboard"></div>
        </div>

        <div class="stats">
            <div class="stat-row">
                <span class="stat-label">Total de Casas:</span>
                <span class="stat-value" id="totalSquares">64</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Status:</span>
                <span class="stat-value" id="status">Tabuleiro Carregado ✅</span>
            </div>
        </div>
    </div>

    <script>
        // Configuração do tabuleiro
        const pieces = [
            ['♖', '♘', '♗', '♕', '♔', '♗', '♘', '♖'],
            ['♙', '♙', '♙', '♙', '♙', '♙', '♙', '♙'],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '],
            ['♟', '♟', '♟', '♟', '♟', '♟', '♟', '♟'],
            ['♜', '♞', '♝', '♛', '♚', '♝', '♞', '♜']
        ];

        const board = document.getElementById('chessboard');
        
        // Criar as 64 casas
        for (let row = 0; row < 8; row++) {
            for (let col = 0; col < 8; col++) {
                const square = document.createElement('div');
                square.className = 'square';
                
                // Determinar cor (padrão xadrez)
                if ((row + col) % 2 === 0) {
                    square.classList.add('light');
                } else {
                    square.classList.add('dark');
                }
                
                // Adicionar peça
                square.textContent = pieces[row][col];
                
                // Adicionar data attributes para referência
                square.setAttribute('data-row', row);
                square.setAttribute('data-col', col);
                
                // Event listener
                square.addEventListener('click', function() {
                    console.log(`Clicou em: linha ${row}, coluna ${col}`);
                });
                
                board.appendChild(square);
            }
        }

        console.log('✅ Tabuleiro de Xadrez Carregado com Sucesso!');
    </script>
</body>
</html>
